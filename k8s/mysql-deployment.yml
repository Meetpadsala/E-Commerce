apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: e-commerce
  labels:
    app: mysql-deployment

spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-deployment

  template:
    metadata:
      labels:
        app: mysql-deployment
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        envFrom:
        - secretRef:
            name: e-secret

